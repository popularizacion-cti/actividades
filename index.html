<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatorio POP CTI - CONCYTEC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="header-titles">
                <h1>Observatorio Nacional de Actividades de Popularización de la Ciencia</h1>
                <p>Consejo Nacional de Ciencia, Tecnología e Innovación - CONCYTEC</p>
            </div>
            <div class="theme-toggle-container">
                <button id="themeToggle" class="theme-switch" title="Cambiar Tema">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                    <div class="switch-handle"></div>
                </button>
            </div>
        </div>
    </header>

    <section class="filter-panel">
        <div class="filter-grid">
            <div class="filter-group search-box">
                <label>Buscar</label>
                <input type="text" id="buscadorTexto" placeholder="Actividad, proyecto, región...">
            </div>
            <div class="filter-group"><label>Objetivo</label><select id="filtroObjetivo"></select></div>
            <div class="filter-group"><label>Programa</label><select id="filtroPrograma"></select></div>
            <div class="filter-group"><label>Proyecto</label><select id="filtroProyecto"></select></div>
            <div class="filter-group"><label>Actividad</label><select id="filtroActividad"></select></div>
            <div class="filter-group"><label>Año</label><select id="filtroAnio"></select></div>
            <div class="filter-group"><label>Región</label><select id="filtroRegion"></select></div>
            <div class="filter-group"><label>Organizador</label><select id="filtroInstitucion"></select></div>
            <div class="filter-group"><label>Alcance</label><select id="filtroAlcance"></select></div>
            <div class="filter-group action-group">
                <label>&nbsp;</label>
                <button id="btnLimpiar" class="btn-clear">Limpiar Filtros</button>
            </div>
        </div>
    </section>

    <section class="indicadores">
        <div class="kpi-card" id="kpiAnios"></div>
        <div class="kpi-card" id="kpiCobertura"></div>
        <div class="kpi-card" id="kpiTotal"></div>
        <div class="kpi-card" id="kpiParticipantes"></div>
        <div class="kpi-card" id="kpiAsistentes"></div>
    </section>

    <div class="main-layout">
        <aside class="side-panel">
            <div class="panel-header">
                <span>LISTA DE ACTIVIDADES</span>
            </div>
            <div id="listaEventos"></div>
        </aside>

        <div class="visual-content">
            <div class="map-container">
                <div class="map-controls">
                    <label for="selectorMetricaMapa">Métrica:</label>
                    <select id="selectorMetricaMapa">
                        <option value="actividades">Actividades</option>
                        <option value="participantes">Participantes</option>
                        <option value="estudiantes"> - Estudiantes</option>
                        <option value="docentes"> - Docentes</option>
                        <option value="investigadores"> - Investigadores</option>
                        <option value="asistentes">Público asistente</option>
                        <option value="presenciales"> - Asistentes presenciales</option>
                        <option value="virtuales"> - Asistentes virtuales</option>
                    </select>
                </div>
                <div id="map"></div>
            </div>

            <div class="charts-sidebar">
                <div class="chart-box">
                    <div class="chart-header" id="tituloGraficoRegion">Top 10 Regiones</div>
                    <div class="canvas-container"><canvas id="graficoRegiones"></canvas></div>
                </div>
                <div class="chart-box">
                    <div class="chart-header" id="tituloGraficoAnio">Tendencia Temporal</div>
                    <div class="canvas-container"><canvas id="graficoAnio"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
